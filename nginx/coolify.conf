server {
    listen 80;
    server_name _;
    client_max_body_size 1000M;

    root /usr/share/nginx/html;
    index index.html;

    # Backend routes
    location ~ ^/(admin|api|api-auth|auth|swagger|plugins|celery-progress|attachments|avatars)/ {
        proxy_redirect off;
        proxy_pass http://testy:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location ~ ^/(ws)/ {
        proxy_pass http://testy:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
    }

    # Django static files
    location /testy-static/ {
        alias /opt/testy/testy-static/;
    }

    # User-uploaded media
    location /media/ {
        alias /opt/testy/media/;
    }

    # MCP server (streamable HTTP)
    location /mcp {
        proxy_pass http://mcp:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # SPA fallback (must be last)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
